<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FRATELLO | Orçamento Arquitetônico</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f3ef;
  color: #333;
  padding: 20px;
}

h1 {
  text-align: center;
}

.container {
  max-width: 900px;
  margin: auto;
}

.card {
  background: white;
  padding: 20px;
  margin-bottom: 15px;
  border-radius: 10px;
}

input, select, button {
  padding: 8px;
  margin: 5px 0;
  width: 100%;
}

button {
  background: #333;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #555;
}

.result {
  font-size: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <h1>FRATELLO</h1>
  <p style="text-align:center;">Sistema de Orçamento Arquitetônico</p>

  <div class="card">
    <h3>Dados do Cliente</h3>
    <input id="cliente" placeholder="Nome do cliente">
    <input id="cidade" placeholder="Cidade">
  </div>

  <div class="card">
    <h3>Configuração</h3>
    <input id="valorM2" type="number" placeholder="Valor por m² (R$)">
  </div>

  <div class="card">
    <h3>Ambientes</h3>

    <input id="nomeAmbiente" placeholder="Nome do ambiente">
    <input id="metragem" type="number" placeholder="Metragem (m²)">

    <select id="complexidade">
      <option value="1">Baixo</option>
      <option value="1.3">Médio</option>
      <option value="1.6">Alto</option>
    </select>

    <button onclick="adicionarAmbiente()">Adicionar Ambiente</button>

    <ul id="listaAmbientes"></ul>
  </div>

  <div class="card">
    <h3>Ajuste Final</h3>
    <input id="fator" type="number" placeholder="Ajuste (%)">
  </div>

  <div class="card">
    <button onclick="calcular()">Calcular Orçamento</button>
  </div>

  <div class="card">
    <div id="resultado" class="result"></div>
    <p id="resumo"></p>
  </div>
</div>

<script>

// ===== ESTRUTURA DE DADOS (PRONTA PRA BACKEND FUTURO) =====
let orcamento = {
  cliente: "",
  cidade: "",
  valorM2: 0,
  ambientes: [],
  total: 0
};

// ===== ADICIONAR AMBIENTE =====
function adicionarAmbiente() {
  let nome = document.getElementById("nomeAmbiente").value;
  let metragem = parseFloat(document.getElementById("metragem").value);
  let complexidade = parseFloat(document.getElementById("complexidade").value);

  if (!nome || !metragem) return;

  let ambiente = {
    nome,
    metragem,
    complexidade
  };

  orcamento.ambientes.push(ambiente);

  atualizarLista();
}

// ===== ATUALIZAR LISTA VISUAL =====
function atualizarLista() {
  let lista = document.getElementById("listaAmbientes");
  lista.innerHTML = "";

  orcamento.ambientes.forEach((amb, index) => {
    let item = document.createElement("li");
    item.innerText = `${amb.nome} - ${amb.metragem}m²`;
    lista.appendChild(item);
  });
}

// ===== CÁLCULO PRINCIPAL =====
function calcular() {
  orcamento.cliente = document.getElementById("cliente").value;
  orcamento.cidade = document.getElementById("cidade").value;
  orcamento.valorM2 = parseFloat(document.getElementById("valorM2").value);

  let total = 0;

  orcamento.ambientes.forEach(amb => {
    let valor = amb.metragem * orcamento.valorM2 * amb.complexidade;
    total += valor;
  });

  // ajuste final
  let fator = parseFloat(document.getElementById("fator").value) || 0;
  total = total * (1 + fator / 100);

  orcamento.total = total;

  mostrarResultado();
}

// ===== RESULTADO =====
function mostrarResultado() {
  document.getElementById("resultado").innerText =
    "R$ " + orcamento.total.toFixed(2);

  document.getElementById("resumo").innerText =
    `Orçamento para ${orcamento.cliente}, em ${orcamento.cidade}, considerando ${orcamento.ambientes.length} ambientes, totalizando R$ ${orcamento.total.toFixed(2)}.`;
}

</script>

</body>
</html>
